<div class="fixed inset-0 z-50 flex items-center justify-center bg-gray-900/60 backdrop-blur-[2px]" @modalOverlayAnimation>
  <div class="w-full max-w-xl bg-white rounded-2xl shadow-2xl overflow-hidden" @modalContentAnimation>
    
    @if (successMessage) {
      <div class="p-10 flex justify-center items-center flex-col text-center bg-green-50">
        <div class="h-20 w-20 bg-green-100 rounded-full flex items-center justify-center mb-5 text-green-600 text-4xl shadow-sm transition-all scale-110">
           <i class="fa-solid fa-check"></i>
        </div>
        <h3 class="text-2xl font-bold text-gray-800 mb-2">¡Completado!</h3>
        <p class="text-green-700 font-medium text-lg">{{ successMessage }}</p>
      </div>
    } @else {
      <div class="bg-gray-50 border-b px-6 py-4 flex items-center justify-between">
        <h2 class="text-xl font-bold text-gray-800 flex items-center gap-2">
          <i class="fa-solid fa-user-plus text-green-600"></i> Nuevo Cliente
        </h2>
        <button class="text-gray-400 hover:text-gray-600 transition" (click)="close.emit()" [disabled]="isLoading">
          <i class="fa-solid fa-xmark text-xl"></i>
        </button>
      </div>

      <div class="p-6">
        @if (errorMessage) {
          <div class="p-4 mb-5 text-sm font-medium text-red-800 bg-red-100 border border-red-200 rounded-lg animate-pulse flex items-start gap-3">
            <i class="fa-solid fa-triangle-exclamation mt-0.5"></i>
            <div>{{ errorMessage }}</div>
          </div>
        }
        
        <form [formGroup]="clientForm" (ngSubmit)="submit()" class="space-y-4">
          <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
            <div class="space-y-1">
              <label class="text-sm font-medium text-gray-700">Nombre</label>
              <input formControlName="firstName" placeholder="Ej. Juan" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-green-500/20 focus:border-green-500 outline-none transition disabled:bg-gray-50 disabled:text-gray-400" [attr.disabled]="isLoading ? '' : null" />
            </div>
            <div class="space-y-1">
              <label class="text-sm font-medium text-gray-700">A. Paterno</label>
              <input formControlName="lastName" placeholder="Ej. Pérez" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-green-500/20 focus:border-green-500 outline-none transition disabled:bg-gray-50 disabled:text-gray-400" [attr.disabled]="isLoading ? '' : null" />
            </div>
            <div class="space-y-1">
              <label class="text-sm font-medium text-gray-700">A. Materno</label>
              <input formControlName="motherName" placeholder="Ej. López" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-green-500/20 focus:border-green-500 outline-none transition disabled:bg-gray-50 disabled:text-gray-400" [attr.disabled]="isLoading ? '' : null" />
            </div>
          </div>

          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div class="space-y-1">
              <label class="text-sm font-medium text-gray-700">Teléfono</label>
              <input formControlName="phone" placeholder="10 dígitos" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-green-500/20 focus:border-green-500 outline-none transition disabled:bg-gray-50 disabled:text-gray-400" [attr.disabled]="isLoading ? '' : null" type="text" />
            </div>
            <div class="space-y-1">
              <label class="text-sm font-medium text-gray-700">Ciudad</label>
              <input formControlName="city" placeholder="Ej. Córdoba" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-green-500/20 focus:border-green-500 outline-none transition disabled:bg-gray-50 disabled:text-gray-400" [attr.disabled]="isLoading ? '' : null" />
            </div>
          </div>

          <div class="space-y-1">
             <label class="text-sm font-medium text-gray-700">Dirección completa</label>
             <textarea formControlName="address" rows="2" placeholder="Av 11, Calle 2..." class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-green-500/20 focus:border-green-500 outline-none transition resize-none disabled:bg-gray-50 disabled:text-gray-400" [attr.disabled]="isLoading ? '' : null"></textarea>
          </div>

          <div class="flex flex-col-reverse sm:flex-row justify-end gap-3 pt-4 border-t mt-6">
            <button type="button" class="px-5 py-2.5 rounded-lg border border-gray-300 text-gray-700 hover:bg-gray-50 font-medium transition disabled:opacity-50" (click)="close.emit()" [disabled]="isLoading">
              Cancelar
            </button>

            <button type="submit" class="px-6 py-2.5 rounded-lg bg-green-600 hover:bg-green-700 active:bg-green-800 text-white font-medium flex items-center justify-center gap-2 transition disabled:opacity-75 disabled:cursor-not-allowed shadow-sm shadow-green-600/20" [disabled]="clientForm.invalid || isLoading">
              @if (isLoading) {
                <i class="fa-solid fa-circle-notch fa-spin"></i>
                <span class="opacity-90">Guardando...</span>
              } @else {
                <i class="fa-solid fa-save"></i>
                <span>Registrar Cliente</span>
              }
            </button>
          </div>
        </form>
      </div>
    }
  </div>
</div>
