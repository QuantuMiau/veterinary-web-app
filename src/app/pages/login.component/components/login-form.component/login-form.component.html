<form [formGroup]="loginForm" (ngSubmit)="submit()" class="space-y-4">
  <!-- Error Alert -->
  @if (loginError) {
    <div class="bg-red-50 border border-red-100 text-red-600 px-4 py-3 rounded-xl text-xs font-bold leading-relaxed animate-in fade-in slide-in-from-top-2 duration-300">
      <div class="flex items-center gap-2">
        <i class="fa-solid fa-circle-exclamation"></i>
        <span>{{ loginError }}</span>
      </div>
    </div>
  }

  <div class="space-y-1.5">
    <label class="text-[10px] font-black uppercase tracking-widest text-slate-500 ml-1">Email</label>
    <div class="relative group">
      <i class="fa-solid fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-indigo-500 transition-colors"></i>
      <input type="email" formControlName="email" 
        class="w-full pl-11 pr-4 py-3 bg-white border border-slate-200 rounded-xl focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all font-medium text-slate-700 placeholder:text-slate-300"
        placeholder="tu@email.com">
    </div>
    @if (loginForm.get('email')?.touched && loginForm.get('email')?.invalid) {
      <p class="text-[10px] font-bold text-red-500 ml-1">Por favor ingresa un email válido</p>
    }
  </div>

  <div class="space-y-1.5">
    <label class="text-[10px] font-black uppercase tracking-widest text-slate-500 ml-1">Password</label>
    <div class="relative group">
      <i class="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-indigo-500 transition-colors"></i>
      <input type="password" formControlName="password" 
        class="w-full pl-11 pr-4 py-3 bg-white border border-slate-200 rounded-xl focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all font-medium text-slate-700 placeholder:text-slate-300"
        placeholder="••••••••">
    </div>
    @if (loginForm.get('password')?.touched && loginForm.get('password')?.invalid) {
      <p class="text-[10px] font-bold text-red-500 ml-1">La contraseña es requerida</p>
    }
  </div>

  <div class="pt-2">
    <button type="submit" [disabled]="loginForm.invalid || isLoading"
      class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-3.5 rounded-xl font-black transition-all shadow-lg shadow-indigo-100 active:scale-[0.98] disabled:opacity-50 disabled:cursor-not-allowed disabled:scale-100 flex items-center justify-center gap-3 uppercase text-[11px] tracking-widest">
      @if (isLoading) {
        <i class="fa-solid fa-circle-notch animate-spin text-lg"></i>
        <span>Iniciando sesión...</span>
      } @else {
        <span>Iniciar sesión</span>
        <i class="fa-solid fa-arrow-right-to-bracket text-sm"></i>
      }
    </button>
  </div>
</form>
