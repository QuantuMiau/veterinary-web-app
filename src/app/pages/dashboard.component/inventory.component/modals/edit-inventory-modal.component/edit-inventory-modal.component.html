<div class="fixed inset-0 z-50 flex items-center justify-center bg-gray-900/60 backdrop-blur-[2px]" @modalOverlayAnimation>
  <div class="w-full max-w-xl bg-white rounded-2xl shadow-2xl overflow-hidden" @modalContentAnimation>
    
    @if (successMessage) {
      <div class="p-10 flex justify-center items-center flex-col text-center bg-green-50/50 min-h-[400px]">
        <div class="h-20 w-20 bg-green-100 rounded-full flex items-center justify-center mb-6 text-green-600 text-4xl shadow-sm transition-all scale-110">
           <i class="fa-solid fa-check"></i>
        </div>
        <h3 class="text-2xl font-black text-gray-800 mb-2 tracking-tight">¡Cambios Guardados!</h3>
        <p class="text-green-700/80 font-bold text-sm uppercase tracking-widest">{{ successMessage }}</p>
      </div>
    } @else {
      <!-- Header -->
      <div class="bg-gray-50 border-b border-gray-100 px-6 py-4 flex items-center justify-between shrink-0">
        <div>
          <h2 class="text-xl font-black text-gray-800 tracking-tight flex items-center gap-2">
            <i class="fa-solid fa-pen-to-square text-green-600"></i> Editar Producto
          </h2>
          <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mt-0.5">Gestión de inventario</p>
        </div>
        <button class="h-8 w-8 flex items-center justify-center rounded-lg text-gray-400 hover:text-gray-600 hover:bg-gray-100 transition-all" (click)="close.emit()" [disabled]="isSaving">
          <i class="fa-solid fa-xmark text-lg"></i>
        </button>
      </div>

      <div class="p-6 overflow-y-auto max-h-[75vh]">
        @if (errorMessage) {
          <div class="p-4 mb-6 text-[11px] font-black text-red-600 bg-red-50 border border-red-100 rounded-xl animate-pulse flex items-start gap-3 uppercase tracking-wide">
            <i class="fa-solid fa-circle-exclamation mt-0.5"></i>
            <div>{{ errorMessage }}</div>
          </div>
        }
        
        <form [formGroup]="itemForm" (ngSubmit)="submit()" class="space-y-6">
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
            <!-- SKU / Código -->
            <div>
              <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1.5 ml-1">Código / SKU</label>
              <div class="relative group">
                <i class="fa-solid fa-barcode absolute left-4 top-1/2 -translate-y-1/2 text-gray-300 group-focus-within:text-green-500 transition-colors"></i>
                <input 
                  type="text" 
                  formControlName="product_id"
                  placeholder="Ej. PROD-102"
                  class="w-full pl-11 pr-4 py-3 bg-gray-50 border border-gray-100 rounded-xl focus:outline-none focus:ring-4 focus:ring-green-500/10 focus:border-green-500 transition-all text-sm font-bold placeholder:text-gray-300"
                >
              </div>
            </div>

            <!-- Status Toggle -->
            <div>
              <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1.5 ml-1">Estado del Producto</label>
              <div class="flex items-center gap-3 p-3 bg-gray-50 rounded-xl border border-gray-100">
                <label class="relative inline-flex items-center cursor-pointer">
                  <input type="checkbox" formControlName="active" class="sr-only peer">
                  <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none peer-focus:ring-4 peer-focus:ring-green-300 rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-green-600"></div>
                </label>
                <span class="text-[11px] font-black uppercase tracking-tight" [ngClass]="itemForm.get('active')?.value ? 'text-green-600' : 'text-gray-400'">
                  {{ itemForm.get('active')?.value ? 'Activo' : 'Inactivo' }}
                </span>
              </div>
            </div>

            <!-- Name -->
            <div class="sm:col-span-2">
              <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1.5 ml-1">Nombre Comercial</label>
              <input 
                type="text" 
                formControlName="name"
                placeholder="Nombre descriptivo del producto"
                class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-xl focus:outline-none focus:ring-4 focus:ring-green-500/10 focus:border-green-500 transition-all text-sm font-bold"
              >
            </div>

            <!-- Category -->
            <div>
              <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1.5 ml-1">Categoría</label>
              <div class="relative">
                <select 
                  formControlName="category_id"
                  (change)="onCategoryChange()"
                  class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-xl focus:outline-none focus:ring-4 focus:ring-green-500/10 focus:border-green-500 transition-all text-sm font-bold appearance-none cursor-pointer"
                >
                  <option *ngFor="let cat of categories" [value]="cat.id">{{ cat.name }}</option>
                </select>
                <i class="fa-solid fa-chevron-down absolute right-4 top-1/2 -translate-y-1/2 text-gray-300 pointer-events-none text-[10px]"></i>
              </div>
            </div>

            <!-- Subcategory -->
            <div>
              <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1.5 ml-1">Subcategoría</label>
              <div class="relative">
                <select 
                  formControlName="subcategoryId"
                  class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-xl focus:outline-none focus:ring-4 focus:ring-green-500/10 focus:border-green-500 transition-all text-sm font-bold appearance-none cursor-pointer"
                >
                  <option *ngFor="let sub of filteredSubcategories" [value]="sub.id">{{ sub.name }}</option>
                </select>
                <i class="fa-solid fa-chevron-down absolute right-4 top-1/2 -translate-y-1/2 text-gray-300 pointer-events-none text-[10px]"></i>
              </div>
            </div>

            <!-- Cost -->
            <div>
              <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1.5 ml-1">Costo Adquisición ($)</label>
              <div class="relative">
                <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 font-bold text-sm">$</span>
                <input 
                  type="number" 
                  formControlName="cost"
                  class="w-full pl-8 pr-4 py-3 bg-gray-50 border border-gray-100 rounded-xl focus:outline-none focus:ring-4 focus:ring-green-500/10 focus:border-green-500 transition-all text-sm font-bold"
                >
              </div>
            </div>

            <!-- Price -->
            <div>
              <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1.5 ml-1">Precio Venta ($)</label>
              <div class="relative">
                <span class="absolute left-4 top-1/2 -translate-y-1/2 text-green-500 font-black text-sm">$</span>
                <input 
                  type="number" 
                  formControlName="price"
                  class="w-full pl-8 pr-4 py-3 bg-gray-50/50 border border-green-100 rounded-xl focus:outline-none focus:ring-4 focus:ring-green-500/10 focus:border-green-500 transition-all text-sm font-black text-green-600"
                >
              </div>
            </div>

            <!-- Stock -->
            <div>
              <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1.5 ml-1">Stock Actual</label>
              <input 
                type="number" 
                formControlName="stock"
                class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-xl focus:outline-none focus:ring-4 focus:ring-green-500/10 focus:border-green-500 transition-all text-sm font-bold"
              >
            </div>
            
            <!-- Image Upload -->
            <div>
              <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1.5 ml-1">Imagen del Producto</label>
              <div class="flex items-center gap-4 p-2 bg-gray-50/50 rounded-2xl border border-gray-100">
                <div class="relative group h-14 w-14 shrink-0 overflow-hidden rounded-xl bg-white shadow-sm border border-gray-100 hover:border-green-300 transition-all flex items-center justify-center">
                  <img *ngIf="imagePreview || itemForm.get('image_url')?.value" [src]="imagePreview || itemForm.get('image_url')?.value" class="h-full w-full object-cover">
                  <i *ngIf="!imagePreview && !itemForm.get('image_url')?.value" class="fa-solid fa-cloud-arrow-up text-gray-200 text-xl"></i>
                  
                  <div *ngIf="isUploading" class="absolute inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center">
                    <i class="fa-solid fa-spinner animate-spin text-white text-[10px]"></i>
                  </div>

                  <input 
                    type="file" 
                    (change)="onFileSelected($event)"
                    accept="image/*"
                    class="absolute inset-0 opacity-0 cursor-pointer"
                    [disabled]="isSaving || isUploading"
                  >
                </div>
                <div class="flex flex-col">
                  <p class="text-[9px] font-black text-gray-700 uppercase tracking-tight">Cambiar foto</p>
                  <button type="button" class="text-[9px] font-black text-green-600 uppercase tracking-widest mt-0.5 hover:text-green-700 disabled:opacity-50">Seleccionar</button>
                </div>
              </div>
            </div>

            <!-- Description -->
            <div class="sm:col-span-2">
              <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1.5 ml-1">Descripción Breve</label>
              <textarea
                formControlName="description"
                rows="2"
                placeholder="Especificaciones, marca o detalles relevantes..."
                class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-xl focus:outline-none focus:ring-4 focus:ring-green-500/10 focus:border-green-500 transition-all text-sm font-bold resize-none"
              ></textarea>
            </div>
          </div>

          <!-- Actions -->
          <div class="flex flex-col-reverse sm:flex-row justify-end gap-3 pt-6 border-t border-gray-100">
            <button 
              type="button"
              (click)="close.emit()"
              class="px-6 py-3 rounded-xl border border-gray-200 text-gray-500 text-[11px] font-black hover:bg-gray-50 transition-all uppercase tracking-widest"
              [disabled]="isSaving"
            >
              Cancelar
            </button>
            <button 
              type="button"
              (click)="submit()"
              class="px-8 py-3 bg-green-600 hover:bg-green-700 text-white rounded-xl text-[11px] font-black transition-all shadow-lg shadow-green-200 active:scale-95 disabled:opacity-50 flex items-center justify-center gap-2 uppercase tracking-widest"
              [disabled]="itemForm.invalid || isSaving || isUploading"
            >
              @if (isSaving) {
                <i class="fa-solid fa-spinner animate-spin"></i>
                <span>Guardando...</span>
              } @else {
                <i class="fa-solid fa-save"></i>
                <span>Actualizar Producto</span>
              }
            </button>
          </div>
        </form>
      </div>
    }
  </div>
</div>
