<div class="flex flex-col h-full max-h-[90vh]">
  <!-- Header -->
  <div class="px-6 py-4 border-b border-gray-100 flex items-center justify-between bg-gray-50/50">
    <div>
      <h2 class="text-xl font-black text-gray-800 tracking-tight">Editar Producto</h2>
      <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Actualizar información</p>
    </div>
    <button (click)="close.emit()" class="text-gray-400 hover:text-gray-600 transition-colors">
      <i class="fa-solid fa-xmark text-xl"></i>
    </button>
  </div>

  <!-- Form Body -->
  <div class="flex-1 overflow-y-auto p-6">
    <form [formGroup]="itemForm" (ngSubmit)="submit()" class="space-y-4">
      
      <!-- Messages -->
      <div *ngIf="errorMessage" class="p-3 rounded-xl bg-red-50 border border-red-100 text-red-600 text-xs font-bold animate-in fade-in slide-in-from-top-2">
        <i class="fa-solid fa-circle-exclamation mr-2"></i>{{ errorMessage }}
      </div>
      <div *ngIf="successMessage" class="p-3 rounded-xl bg-green-50 border border-green-100 text-green-600 text-xs font-bold animate-in fade-in slide-in-from-top-2">
        <i class="fa-solid fa-circle-check mr-2"></i>{{ successMessage }}
      </div>

      <div class="grid grid-cols-2 gap-4">
        <!-- SKU / Product ID -->
        <div class="col-span-2">
          <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1.5 ml-1">Código / SKU</label>
          <div class="relative group">
            <i class="fa-solid fa-barcode absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-blue-500"></i>
            <input 
              type="text" 
              formControlName="product_id"
              placeholder="Ej: MED-001"
              class="w-full pl-11 pr-4 py-2.5 bg-gray-50 border border-gray-100 rounded-xl focus:outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all text-sm font-bold"
            >
          </div>
        </div>

        <!-- Name -->
        <div class="col-span-2">
          <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1.5 ml-1">Nombre del Producto</label>
          <input 
            type="text" 
            formControlName="name"
            placeholder="Ej: Antibiótico Amoxicilina"
            class="w-full px-4 py-2.5 bg-gray-50 border border-gray-100 rounded-xl focus:outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all text-sm font-bold"
          >
        </div>

        <!-- Category -->
        <div>
          <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1.5 ml-1">Categoría</label>
          <div class="relative">
            <select 
              formControlName="category_id"
              (change)="onCategoryChange()"
              class="w-full px-4 py-2.5 bg-gray-50 border border-gray-100 rounded-xl focus:outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all text-sm font-bold appearance-none cursor-pointer"
            >
              <option *ngFor="let cat of categories" [value]="cat.id">{{ cat.name }}</option>
            </select>
            <i class="fa-solid fa-chevron-down absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none text-xs"></i>
          </div>
        </div>

        <!-- Subcategory -->
        <div>
          <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1.5 ml-1">Subcategoría</label>
          <div class="relative">
            <select 
              formControlName="subcategoryId"
              class="w-full px-4 py-2.5 bg-gray-50 border border-gray-100 rounded-xl focus:outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all text-sm font-bold appearance-none cursor-pointer"
            >
              <option *ngFor="let sub of filteredSubcategories" [value]="sub.id">{{ sub.name }}</option>
            </select>
            <i class="fa-solid fa-chevron-down absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none text-xs"></i>
          </div>
        </div>

        <!-- Cost -->
        <div>
          <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1.5 ml-1">Costo ($)</label>
          <input 
            type="number" 
            formControlName="cost"
            class="w-full px-4 py-2.5 bg-gray-50 border border-gray-100 rounded-xl focus:outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all text-sm font-bold"
          >
        </div>

        <!-- Price -->
        <div>
          <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1.5 ml-1">Precio Venta ($)</label>
          <input 
            type="number" 
            formControlName="price"
            class="w-full px-4 py-2.5 bg-gray-50 border border-gray-100 rounded-xl focus:outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all text-sm font-bold text-green-600"
          >
        </div>

        <!-- Stock -->
        <div>
          <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1.5 ml-1">Stock Actual</label>
          <input 
            type="number" 
            formControlName="stock"
            class="w-full px-4 py-2.5 bg-gray-50 border border-gray-100 rounded-xl focus:outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all text-sm font-bold"
          >
        </div>

        <!-- Active Toggle -->
        <div class="flex items-center gap-3 pt-6">
          <label class="relative inline-flex items-center cursor-pointer">
            <input type="checkbox" formControlName="active" class="sr-only peer">
            <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none peer-focus:ring-4 peer-focus:ring-blue-300 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-600 font-black"></div>
          </label>
          <span class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Activo</span>
        </div>

      <!-- Image Upload -->
      <div class="col-span-2">
        <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1.5 ml-1">Imagen del Producto</label>
        <div class="flex items-center gap-4 p-4 bg-gray-50/50 rounded-2xl border border-gray-100">
          <div class="relative group h-20 w-20 shrink-0 overflow-hidden rounded-xl bg-white shadow-sm border border-gray-100 hover:border-blue-400 transition-all flex items-center justify-center">
            <img *ngIf="imagePreview || itemForm.get('image_url')?.value" [src]="imagePreview || itemForm.get('image_url')?.value" class="h-full w-full object-cover">
            <i *ngIf="!imagePreview && !itemForm.get('image_url')?.value" class="fa-solid fa-image text-gray-200 text-3xl"></i>
            
            <!-- Progress Overlay -->
            <div *ngIf="isUploading" class="absolute inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center">
              <i class="fa-solid fa-spinner animate-spin text-white"></i>
            </div>

            <input 
              type="file" 
              (change)="onFileSelected($event)"
              accept="image/*"
              class="absolute inset-0 opacity-0 cursor-pointer"
            >
          </div>
          <div class="flex flex-col gap-1">
            <p class="text-xs font-black text-gray-700">Subir fotografía</p>
            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">JPG, PNG o WEBP</p>
            <button type="button" class="text-[10px] font-black text-blue-600 uppercase tracking-widest mt-1 hover:text-blue-700">
              Seleccionar archivo
            </button>
          </div>
        </div>
      </div>

      <!-- Description -->
      <div class="col-span-2">
        <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1.5 ml-1">Descripción</label>
        <textarea 
          formControlName="description"
          rows="2"
          placeholder="Detalles adicionales del producto..."
          class="w-full px-4 py-2.5 bg-gray-50 border border-gray-100 rounded-xl focus:outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all text-sm font-bold resize-none"
        ></textarea>
      </div>
      </div>
    </form>
  </div>

  <!-- Footer Actions -->
  <div class="p-6 border-t border-gray-100 bg-gray-50/50 flex gap-3">
    <button 
      (click)="close.emit()" 
      class="flex-1 px-4 py-3 rounded-xl border border-gray-200 text-gray-500 font-bold hover:bg-white transition-all active:scale-95 text-xs font-black uppercase"
    >
      CANCELAR
    </button>
    <button 
      (click)="submit()"
      [disabled]="itemForm.invalid || isSaving"
      class="flex-[2] px-4 py-3 rounded-xl bg-blue-600 text-white font-black shadow-lg shadow-blue-200 hover:bg-blue-700 disabled:opacity-50 disabled:shadow-none transition-all active:scale-95 flex items-center justify-center gap-2 text-xs uppercase"
    >
      <i *ngIf="isSaving" class="fa-solid fa-spinner animate-spin"></i>
      {{ isSaving ? 'ACTUALIZANDO...' : 'ACTUALIZAR PRODUCTO' }}
    </button>
  </div>
</div>
