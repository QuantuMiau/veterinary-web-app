<div class="fixed inset-0 z-[9999] flex items-center justify-center bg-gray-900/60 backdrop-blur-[2px]" @modalOverlayAnimation>
  <div class="w-full max-w-xl bg-white rounded-2xl shadow-2xl overflow-hidden" @modalContentAnimation>
    
    <!-- Header -->
    <div class="bg-teal-600 px-6 py-8 relative overflow-hidden shrink-0 font-inter">
      <div class="absolute top-0 right-0 -mt-4 -mr-4 h-24 w-24 bg-white/10 rounded-full blur-2xl"></div>
      <div class="relative z-10 flex items-center gap-4">
        <div class="h-12 w-12 bg-white/20 rounded-xl flex items-center justify-center text-white text-2xl backdrop-blur-md">
          <i class="fa-solid fa-calendar-check"></i>
        </div>
        <div>
          <h2 class="text-xl font-black text-white tracking-tight">Nueva Cita</h2>
          <p class="text-[10px] font-bold text-teal-100 uppercase tracking-widest opacity-80">Programación de servicios veterinarios</p>
        </div>
      </div>
      <button (click)="closeModal()" class="absolute top-6 right-6 text-white/60 hover:text-white transition-colors z-50">
        <i class="fa-solid fa-xmark text-xl"></i>
      </button>
    </div>

    <div class="p-6">
      <form [formGroup]="appointmentForm" (ngSubmit)="onSubmit()" class="space-y-4">
        <div>
          <label class="text-sm font-medium text-gray-700">Nombre de la persona</label>
          <input type="text" formControlName="personName" placeholder="Ej. Juan Pérez" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-teal-500/20 focus:border-teal-500 outline-none transition" />
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div class="space-y-1">
            <label class="text-sm font-medium text-gray-700">Fecha</label>
            <input type="date" formControlName="date" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-teal-500/20 focus:border-teal-500 outline-none transition" />
          </div>
          <div class="space-y-1">
            <label class="text-sm font-medium text-gray-700">Hora</label>
            <select formControlName="time" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-teal-500/20 focus:border-teal-500 outline-none transition">
              @for (slot of availableTimes; track slot) {
                <option [value]="slot">{{ slot }}</option>
              }
            </select>
          </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div class="space-y-1">
            <label class="text-sm font-medium text-gray-700">Tipo de mascota</label>
            <select formControlName="petType" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-teal-500/20 focus:border-teal-500 outline-none transition">
              <option value="perro">Perro</option>
              <option value="gato">Gato</option>
              <option value="conejo">Conejo</option>
              <option value="ave">Ave</option>
              <option value="otro">Otro</option>
            </select>
          </div>
          <div class="space-y-1">
            <label class="text-sm font-medium text-gray-700">Motivo</label>
            <input type="text" formControlName="reason" placeholder="Ej. Consulta general" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-teal-500/20 focus:border-teal-500 outline-none transition" />
          </div>
        </div>

        <div>
          <label class="text-sm font-medium text-gray-700">Descripción / Notas</label>
          <textarea formControlName="description" rows="3" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-teal-500/20 focus:border-teal-500 outline-none transition"></textarea>
        </div>

        <!-- Actions -->
        <div class="flex flex-col-reverse sm:flex-row justify-end gap-3 pt-6 border-t border-gray-100 mt-6 font-inter">
          <button 
            type="button" 
            (click)="closeModal()" 
            class="px-6 py-3 rounded-xl border border-gray-200 text-gray-500 text-[11px] font-black hover:bg-gray-50 transition-all uppercase tracking-widest"
          >
            Cancelar
          </button>

          <button 
            type="submit" 
            class="px-8 py-3 bg-teal-600 hover:bg-teal-700 text-white rounded-xl text-[11px] font-black transition-all shadow-lg shadow-teal-200 active:scale-95 disabled:opacity-50 flex items-center justify-center gap-2 uppercase tracking-widest"
            [disabled]="appointmentForm.invalid"
          >
            <i class="fa-solid fa-save text-sm"></i>
            <span>Guardar Cita</span>
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
