<div class="h-full flex flex-col gap-6 p-6 overflow-hidden backdrop-blur-sm font-inter">
  <!-- Header -->
  <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 shrink-0 font-inter">
    <div>
      <h1 class="text-3xl font-black text-gray-900 tracking-tight text-teal-900">Calendario</h1>
      <p class="text-gray-500 font-medium tracking-tight">Gestión de citas y eventos de la clínica</p>
    </div>

    <div class="flex items-center gap-3">
      <button (click)="openAddEventModal()"
        class="flex items-center gap-2 bg-teal-600 hover:bg-teal-700 text-white px-5 py-2.5 rounded-xl font-black transition-all shadow-md active:scale-95 whitespace-nowrap shadow-teal-100 uppercase text-[11px] tracking-widest">
        <i class="fa-solid fa-calendar-plus text-sm"></i>
        <span>Agendar Cita</span>
      </button>
    </div>
  </div>

  <!-- Content Area -->
  <div class="flex-1 min-h-0 relative">
    <div class="h-full bg-white rounded-3xl border border-gray-100 shadow-sm flex flex-col overflow-hidden p-6 transition-all">
      <div class="h-full overflow-auto">
        <full-calendar #calendar [options]="calendarOptions"></full-calendar>
      </div>
    </div>
  </div>

</div>

@if (showAddEventModal) {
  <app-add-event-modal 
    [initialDate]="initialDate"
    [initialTime]="initialTime"
    [existingAppointments]="allAppointments"
    (close)="closeModal()" 
    (save)="saveAppointment($event)">
  </app-add-event-modal>
}

@if (selectedAppointment) {
  <app-event-detail-modal
    [appointment]="selectedAppointment"
    (close)="closeModal()"
    (delete)="deleteAppointment($event)">
  </app-event-detail-modal>
}

@if (showDeleteConfirm) {
  <app-confirmation-modal
    title="Eliminar Cita"
    message="¿Estás seguro de que deseas eliminar esta cita? Esta acción no se puede deshacer."
    confirmText="Eliminar"
    cancelText="Cancelar"
    type="danger"
    (confirm)="confirmDelete()"
    (cancel)="cancelDelete()">
  </app-confirmation-modal>
}
