<div class="fixed inset-0 z-50 flex items-center justify-center bg-gray-900/60 backdrop-blur-[1.5px]"
  @modalOverlayAnimation>
  <div class="w-full max-w-md bg-white rounded-2xl shadow-2xl overflow-hidden" @modalContentAnimation>

    @if (successMessage) {
    <div class="p-10 flex flex-col items-center justify-center text-center bg-red-50/50 min-h-[300px] relative font-inter">
      <button (click)="close.emit()" class="absolute top-6 right-6 text-red-300 hover:text-red-500 transition-colors z-50">
        <i class="fa-solid fa-xmark text-xl"></i>
      </button>
      <div
        class="h-20 w-20 bg-red-100 rounded-full flex items-center justify-center mb-6 text-red-600 text-4xl transition-all scale-110 shadow-sm">
        <i class="fa-solid fa-check"></i>
      </div>
      <h3 class="text-2xl font-black text-gray-800 mb-2 tracking-tight">¡Empleado Desactivado!</h3>
      <p class="text-red-700/80 font-bold text-sm uppercase tracking-widest">{{ successMessage }}</p>
    </div>
    } @else {
    <!-- Warning Header -->
    <div class="bg-red-50 px-6 py-8 flex flex-col items-center text-center relative font-inter shrink-0">
      <button (click)="close.emit()" class="absolute top-4 right-4 text-red-300 hover:text-red-500 transition-colors z-50" [disabled]="isLoading">
        <i class="fa-solid fa-xmark text-xl"></i>
      </button>
      <div class="h-16 w-16 bg-white rounded-2xl flex items-center justify-center mb-4 text-red-500 text-3xl shadow-sm border border-red-100">
        <i class="fa-solid fa-triangle-exclamation"></i>
      </div>
      <h2 class="text-2xl font-black text-gray-800 tracking-tight">¿Desactivar Empleado?</h2>
      <p class="text-red-600/70 font-bold text-[10px] uppercase tracking-[0.2em] mt-1">Esta acción es irreversible</p>
    </div>

    <div class="p-8 pt-2 font-inter">
      <p class="text-gray-500 text-center mb-8 leading-relaxed">
        Estás a punto de desactivar el acceso de este empleado de forma permanente. 
        <span class="font-bold text-gray-700">¿Deseas continuar con la baja?</span>
      </p>

      @if (errorMessage) {
      <div
        class="p-4 mb-6 text-sm font-medium text-red-800 bg-red-100 border border-red-200 rounded-lg animate-pulse flex items-start text-left gap-3">
        <i class="fa-solid fa-triangle-exclamation mt-0.5"></i>
        <div>{{ errorMessage }}</div>
      </div>
      }

      <div class="flex flex-col-reverse sm:flex-row justify-center gap-3">
        <button 
          type="button"
          (click)="close.emit()" 
          class="px-8 py-3 rounded-xl border border-gray-200 text-gray-500 text-[11px] font-black hover:bg-gray-50 transition-all uppercase tracking-widest"
          [disabled]="isLoading"
        >
          Cancelar
        </button>

        <button 
          type="button" 
          (click)="confirm()"
          class="px-10 py-3 bg-red-600 hover:bg-red-700 text-white rounded-xl text-[11px] font-black transition-all shadow-lg shadow-red-200 active:scale-95 disabled:opacity-50 flex items-center justify-center gap-2 uppercase tracking-widest"
          [disabled]="isLoading"
        >
          @if (isLoading) {
            <i class="fa-solid fa-spinner animate-spin text-sm"></i>
            <span>Desactivando...</span>
          } @else {
            <i class="fa-solid fa-user-slash text-sm"></i>
            <span>Confirmar Baja</span>
          }
        </button>
      </div>
    </div>
    }
  </div>
</div>
