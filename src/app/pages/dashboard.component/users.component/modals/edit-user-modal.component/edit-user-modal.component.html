<div class="fixed inset-0 z-50 flex items-center justify-center bg-gray-900/60 backdrop-blur-[1.5px]"
  @modalOverlayAnimation>
  <div class="w-full max-w-lg bg-white rounded-2xl shadow-2xl overflow-hidden" @modalContentAnimation>

    @if (successMessage) {
    <div class="p-10 flex justify-center items-center flex-col text-center bg-indigo-50/50 min-h-[450px] relative font-inter">
      <button (click)="close.emit()" class="absolute top-6 right-6 text-indigo-300 hover:text-indigo-500 transition-colors z-50">
        <i class="fa-solid fa-xmark text-xl"></i>
      </button>
      <div class="h-20 w-20 bg-indigo-100 rounded-full flex items-center justify-center mb-6 text-indigo-600 text-4xl shadow-sm transition-all scale-110">
        <i class="fa-solid fa-check"></i>
      </div>
      <h3 class="text-2xl font-black text-gray-800 mb-2 tracking-tight">¡Empleado Actualizado!</h3>
      <p class="text-indigo-700/80 font-bold text-sm uppercase tracking-widest">{{ successMessage }}</p>
    </div>
    } @else {
    <!-- Header -->
    <div class="bg-indigo-600 px-6 py-8 relative overflow-hidden shrink-0 font-inter">
      <div class="absolute top-0 right-0 -mt-4 -mr-4 h-24 w-24 bg-white/10 rounded-full blur-2xl"></div>
      <div class="relative z-10 flex items-center gap-4">
        <div class="h-12 w-12 bg-white/20 rounded-xl flex items-center justify-center text-white text-2xl backdrop-blur-md">
          <i class="fa-solid fa-user-pen"></i>
        </div>
        <div>
          <h2 class="text-xl font-black text-white tracking-tight">Editar Empleado</h2>
          <p class="text-[10px] font-bold text-indigo-100 uppercase tracking-widest opacity-80">Referencia: #{{ user?.id || user?.employee_id || user?.employeeId }}</p>
        </div>
      </div>
      <button (click)="close.emit()" class="absolute top-6 right-6 text-white/60 hover:text-white transition-colors z-50" [disabled]="isLoading">
        <i class="fa-solid fa-xmark text-xl"></i>
      </button>
    </div>

    <div class="p-6">
      @if (errorMessage) {
      <div
        class="p-4 mb-5 text-sm font-medium text-red-800 bg-red-100 border border-red-200 rounded-lg animate-pulse flex items-start gap-3">
        <i class="fa-solid fa-triangle-exclamation mt-0.5"></i>
        <div>{{ errorMessage }}</div>
      </div>
      }

      <form [formGroup]="userForm" (ngSubmit)="submit()" class="space-y-5">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div class="space-y-1">
            <label class="text-sm font-medium text-gray-700">Nombre</label>
            <input formControlName="firstName" placeholder="Ej. Juan"
              class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition disabled:bg-gray-50 disabled:text-gray-400"
              [attr.disabled]="isLoading ? '' : null" />
          </div>
          <div class="space-y-1">
            <label class="text-sm font-medium text-gray-700">Apellido Paterno</label>
            <input formControlName="lastName" placeholder="Ej. Pérez"
              class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition disabled:bg-gray-50 disabled:text-gray-400"
              [attr.disabled]="isLoading ? '' : null" />
          </div>
        </div>
        <div class="space-y-1">
          <label class="text-sm font-medium text-gray-700">Apellido Materno</label>
          <input formControlName="motherName" placeholder="Ej. López"
            class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition disabled:bg-gray-50 disabled:text-gray-400"
            [attr.disabled]="isLoading ? '' : null" />
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div class="space-y-1">
            <label class="text-sm font-medium text-gray-700">Rol</label>
            <select formControlName="role"
              class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition disabled:bg-gray-50 disabled:text-gray-400 appearance-none bg-white"
              [attr.disabled]="isLoading ? '' : null">
              <option value="">Seleccione el rol</option>
              <option value="Admin">Administrador</option>
              <option value="Empleado">Empleado</option>
            </select>
          </div>
          <div class="space-y-1">
            <label class="text-sm font-medium text-gray-700">Teléfono</label>
            <input formControlName="phone" placeholder="10 dígitos"
              class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition disabled:bg-gray-50 disabled:text-gray-400"
              [attr.disabled]="isLoading ? '' : null" type="text" />
          </div>
        </div>

        <div class="space-y-1">
          <label class="text-sm font-medium text-gray-700">Correo Electrónico</label>
          <input formControlName="email" placeholder="usuario@ejemplo.com"
            class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition disabled:bg-gray-50 disabled:text-gray-400"
            [attr.disabled]="isLoading ? '' : null" type="email" />
        </div>

        <!-- Actions -->
        <div class="flex flex-col-reverse sm:flex-row justify-end gap-3 pt-6 border-t border-gray-100 mt-6 font-inter">
          <button 
            type="button" 
            (click)="close.emit()" 
            class="px-6 py-3 rounded-xl border border-gray-200 text-gray-500 text-[11px] font-black hover:bg-gray-50 transition-all uppercase tracking-widest"
            [disabled]="isLoading"
          >
            Cancelar
          </button>

          <button 
            type="submit" 
            class="px-8 py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl text-[11px] font-black transition-all shadow-lg shadow-indigo-200 active:scale-95 disabled:opacity-50 flex items-center justify-center gap-2 uppercase tracking-widest"
            [disabled]="userForm.invalid || isLoading"
          >
            @if (isLoading) {
              <i class="fa-solid fa-spinner animate-spin text-sm"></i>
              <span>Guardando...</span>
            } @else {
              <i class="fa-solid fa-save text-sm"></i>
              <span>Guardar Cambios</span>
            }
          </button>
        </div>
      </form>
    </div>
    }
  </div>
</div>
