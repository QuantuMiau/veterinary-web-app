<div class="flex-1 flex flex-col min-h-0 bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
  <!-- Tabs Navigation -->
  <div class="flex items-center gap-1.5 px-4 pt-4 pb-0 bg-white border-b border-gray-100">
    <button
      *ngFor="let tab of tabs"
      (click)="activeTab = tab.id"
      class="flex items-center gap-2 px-5 py-2.5 rounded-t-xl text-sm font-black transition-all relative focus:outline-none"
      [ngClass]="{
        'bg-teal-600 text-white shadow-md': activeTab === tab.id,
        'text-gray-400 hover:text-teal-600 hover:bg-teal-50/50': activeTab !== tab.id
      }"
    >
      <i class="fa-solid text-sm" [ngClass]="tab.icon"></i>
      <span class="tracking-tight">{{ tab.label }}</span>
    </button>
  </div>

  <!-- Tab Content Area -->
  <div class="flex-1 overflow-auto p-6 bg-gray-50/30">
    <app-visits-table *ngIf="activeTab === 'visits'" [patientId]="patientId"></app-visits-table>
    <app-rx-table *ngIf="activeTab === 'rx'" [patientId]="patientId"></app-rx-table>
    <app-labs-table *ngIf="activeTab === 'labs'" [patientId]="patientId"></app-labs-table>
  </div>
</div>
