<div class="fixed inset-0 z-50 flex items-center justify-center bg-gray-900/60 backdrop-blur-[2px]" @modalOverlayAnimation>
  <div class="w-full max-w-xl bg-white rounded-2xl shadow-2xl overflow-hidden" @modalContentAnimation>
    
    @if (successMessage) {
      <div class="p-10 flex justify-center items-center flex-col text-center bg-teal-50/50 min-h-[400px] relative font-inter">
        <button (click)="close.emit()" class="absolute top-6 right-6 text-teal-300 hover:text-teal-500 transition-colors z-50">
          <i class="fa-solid fa-xmark text-xl"></i>
        </button>
        <div class="h-20 w-20 bg-teal-100 rounded-full flex items-center justify-center mb-6 text-teal-600 text-4xl shadow-sm transition-all scale-110">
           <i class="fa-solid fa-check"></i>
        </div>
        <h3 class="text-2xl font-black text-gray-800 mb-2 tracking-tight">¡Paciente Registrado!</h3>
        <p class="text-teal-700/80 font-bold text-sm uppercase tracking-widest">{{ successMessage }}</p>
      </div>
    } @else {
      <!-- Header -->
      <div class="bg-teal-600 px-6 py-8 relative overflow-hidden shrink-0 font-inter">
        <div class="absolute top-0 right-0 -mt-4 -mr-4 h-24 w-24 bg-white/10 rounded-full blur-2xl"></div>
        <div class="relative z-10 flex items-center gap-4">
          <div class="h-12 w-12 bg-white/20 rounded-xl flex items-center justify-center text-white text-2xl backdrop-blur-md">
            <i class="fa-solid fa-paw"></i>
          </div>
          <div>
            <h2 class="text-xl font-black text-white tracking-tight">Nuevo Paciente</h2>
            <p class="text-[10px] font-bold text-teal-100 uppercase tracking-widest opacity-80">Registro de expediente clínico</p>
          </div>
        </div>
        <button (click)="close.emit()" class="absolute top-6 right-6 text-white/60 hover:text-white transition-colors z-50" [disabled]="isLoading">
          <i class="fa-solid fa-xmark text-xl"></i>
        </button>
      </div>

      <div class="p-6">
        @if (errorMessage) {
          <div class="p-4 mb-5 text-sm font-medium text-red-800 bg-red-100 border border-red-200 rounded-lg animate-pulse flex items-start gap-3">
            <i class="fa-solid fa-triangle-exclamation mt-0.5"></i>
            <div>{{ errorMessage }}</div>
          </div>
        }
        
        <form [formGroup]="patientForm" (ngSubmit)="submit()" class="space-y-4">
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div class="space-y-1">
              <label class="text-sm font-medium text-gray-700">Nombre de la mascota</label>
              <input formControlName="name" placeholder="Ej. Firulais" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-green-500/20 focus:border-green-500 outline-none transition disabled:bg-gray-50" [attr.disabled]="isLoading ? '' : null" />
            </div>
            
            <div class="space-y-1">
              <label class="text-sm font-medium text-gray-700">Dueño (Cliente)</label>
              <select formControlName="client_id" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-green-500/20 focus:border-green-500 outline-none transition disabled:bg-gray-50" [attr.disabled]="isLoading ? '' : null">
                <option [ngValue]="null" disabled>Seleccione un dueño</option>
                @for (client of clients; track client.client_id || $index) {
                  <option [ngValue]="client.client_id">{{ client.first_name }} {{ client.last_name }}</option>
                }
              </select>
            </div>
          </div>

          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div class="space-y-1">
              <label class="text-sm font-medium text-gray-700">Especie</label>
              <select formControlName="species_id" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-green-500/20 focus:border-green-500 outline-none transition disabled:bg-gray-50" [attr.disabled]="isLoading ? '' : null">
                <option [ngValue]="null">Seleccionar especie</option>
                @for (item of speciesList; track item.id) {
                  <option [ngValue]="item.id">{{ item.name }}</option>
                }
              </select>
            </div>
            
            <div class="space-y-1">
              <label class="text-sm font-medium text-gray-700">Sexo</label>
              <select formControlName="sex" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-green-500/20 focus:border-green-500 outline-none transition disabled:bg-gray-50" [attr.disabled]="isLoading ? '' : null">
                <option value="">Seleccionar sexo</option>
                <option value="Macho">Macho</option>
                <option value="Hembra">Hembra</option>
              </select>
            </div>
          </div>

          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div class="space-y-1">
              <label class="text-sm font-medium text-gray-700">Raza</label>
              <input formControlName="breed" placeholder="Ej. Poodle" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-green-500/20 focus:border-green-500 outline-none transition disabled:bg-gray-50" [attr.disabled]="isLoading ? '' : null" />
            </div>
            <div class="space-y-1">
              <label class="text-sm font-medium text-gray-700">Color / Señas</label>
              <input formControlName="color" placeholder="Ej. Café con manchas" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-green-500/20 focus:border-green-500 outline-none transition disabled:bg-gray-50" [attr.disabled]="isLoading ? '' : null" />
            </div>
          </div>

          <!-- Actions -->
          <div class="flex flex-col-reverse sm:flex-row justify-end gap-3 pt-6 border-t border-gray-100 mt-6 font-inter">
            <button 
              type="button" 
              (click)="close.emit()" 
              class="px-6 py-3 rounded-xl border border-gray-200 text-gray-500 text-[11px] font-black hover:bg-gray-50 transition-all uppercase tracking-widest"
              [disabled]="isLoading"
            >
              Cancelar
            </button>

            <button 
              type="submit" 
              class="px-8 py-3 bg-teal-600 hover:bg-teal-700 text-white rounded-xl text-[11px] font-black transition-all shadow-lg shadow-teal-200 active:scale-95 disabled:opacity-50 flex items-center justify-center gap-2 uppercase tracking-widest"
              [disabled]="patientForm.invalid || isLoading"
            >
              @if (isLoading) {
                <i class="fa-solid fa-spinner animate-spin text-sm"></i>
                <span>Guardando...</span>
              } @else {
                <i class="fa-solid fa-save text-sm"></i>
                <span>Registrar Paciente</span>
              }
            </button>
          </div>
        </form>
      </div>
    }
  </div>
</div>
